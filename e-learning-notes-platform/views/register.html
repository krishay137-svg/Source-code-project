<!DOCTYPE html>

<html>

<head>

<title>

Register

</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="box">

<h2>

Register

</h2>

<form

action="/auth/register"

method="POST">

<input

type="text"

name="fullname"

placeholder="Full Name"

required>

<input

type="email"

name="email"

placeholder="Email"

required>

<input

type="password"

name="password"

placeholder="Password"

required>

<button>

Register

</button>

</form>

<p>

Already have an account?

<a href="/login">

Login

</a>

</p>

</div>

<script src="/js/register.js"></script>

</body>

</html>
