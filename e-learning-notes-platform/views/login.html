<!DOCTYPE html>

<html>

<head>

<title>

Login

</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="box">

<h2>

Login

</h2>

<form

action="/auth/login"

method="POST">

<input

type="email"

name="email"

placeholder="Email"

required>

<input

type="password"

name="password"

placeholder="Password"

required>

<button>

Login

</button>

</form>

<p>

Don't have an account?

<a href="/register">

Register

</a>

</p>

</div>

<script src="/js/login.js"></script>

</body>

</html>
